<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵医大模型 - 健康分析测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 1.05em;
        }
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .mode-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .mode-card:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .mode-card.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .mode-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }
        .mode-name {
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 4px;
        }
        .mode-desc {
            font-size: 0.8em;
            opacity: 0.8;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .file-upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .file-upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        .file-upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }
        .file-upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .file-upload-text {
            color: #666;
            font-size: 1em;
        }
        .file-list {
            margin-top: 15px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-icon {
            font-size: 1.5em;
        }
        .file-name {
            font-weight: 500;
            color: #333;
        }
        .file-remove {
            background: #fee;
            border: none;
            color: #c33;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .file-remove:hover {
            background: #fcc;
        }
        .result-section {
            margin-top: 30px;
            display: none;
        }
        .result-section.show {
            display: block;
        }
        .result-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid #667eea;
        }
        .result-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .result-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #555;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .response-mode-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .response-mode-group label {
            margin-bottom: 0;
            flex-shrink: 0;
        }
        .response-mode-group .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .example-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .example-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .example-btn:hover {
            background: #e0e0e0;
        }
        .timing-info {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        .timing-item {
            display: flex;
            flex-direction: column;
        }
        .timing-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 4px;
        }
        .timing-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 小贝&灵医大模型</h1>
            <p>健康分析测试工具 - 支持多种医疗AI能力</p>
            <p>仅用于内部测试，对生成结果不负任何责任</p>
        </div>

        <div class="main-card">
            <form id="healthForm">
                <div class="form-group">
                    <label>🎯 选择功能模式</label>
                    <div class="mode-grid" id="modeGrid">
                    </div>
                </div>

                <div class="form-group">
                    <label>💬 输入内容</label>
                    <textarea id="textInput" rows="8" placeholder="请输入您要咨询的内容..."></textarea>
                    <div class="example-buttons" id="exampleButtons" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label>📁 上传图片（可选，用于舌诊、医学视觉等）</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <div class="file-upload-icon">📎</div>
                        <div class="file-upload-text">点击或拖拽上传图片（jpg/png）</div>
                        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" style="display: none;">
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <div class="form-group">
                    <div class="response-mode-group">
                        <label>📡 响应模式：</label>
                        <label class="radio-label">
                            <input type="radio" name="responseMode" value="normal"> 普通响应
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="responseMode" value="stream" checked> 流式响应（推荐）
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    🧪 开始分析
                </button>
            </form>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>正在分析，请稍候...</p>
            </div>

            <div id="error" class="error-message" style="display: none;"></div>

            <div class="result-section" id="resultSection">
                <div class="result-card">
                    <h3 id="resultTitle">📄 分析报告</h3>
                    <div class="result-content" id="resultContent"></div>
                    <div class="timing-info" id="timingInfo" style="display: none;">
                        <div class="timing-item">
                            <span class="timing-label">TTFB（首字节时间）</span>
                            <span class="timing-value" id="ttfbTime">-</span>
                        </div>
                        <div class="timing-item">
                            <span class="timing-label">总响应时间</span>
                            <span class="timing-value" id="totalTime">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedMode = 'health_qa';
        let uploadedFile = null;
        let modelConfigs = {};

        const modeIcons = {
            'pre_consult': '🩺',
            'triage': '🏥',
            'symptom_diagnosis': '🔍',
            'health_qa': '📚',
            'drug_consult': '💊',
            'kb_qa': '📖',
            'skin_disease': '👩‍⚕️',
            'report_interpret': '📊',
            'medical_vision': '🖼️',
            'tcm_diagnose': '👅',
            'clinical_decision': '⚕️',
            'emr_generation': '📝',
            'health_analysis': '📈',
            'clinical_diagnose': '🏥'
        };

        const examples = {
            'health_analysis': [
                {
                    name: '示例1 - 基本正常',
                    content: `血压：128/82 mmHg
心率：72 次/分
血氧：98%
空腹血糖：5.4 mmol/L
总胆固醇：5.1 mmol/L
甘油三酯：1.3 mmol/L
体重：68 kg
身高：170 cm
BMI：23.5`
                },
                {
                    name: '示例2 - 有健康风险',
                    content: `血压：145/95 mmHg
心率：88 次/分
血氧：95%
空腹血糖：7.8 mmol/L
体重：85 kg
身高：172 cm
BMI：28.7
最近感觉：头晕、易疲劳`
                },
                {
                    name: '示例3 - 中老年健康',
                    content: `血压：150/90 mmHg
心率：76 次/分
空腹血糖：6.8 mmol/L
总胆固醇：6.2 mmol/L
甘油三酯：2.1 mmol/L
体重：78 kg
身高：168 cm
年龄：58岁
既往史：高血压病史5年`
                }
            ],
            'pre_consult': [
                {
                    name: '示例1 - 感冒症状',
                    content: '最近三天感觉头痛、发热、咳嗽、流鼻涕，体温37.8度，全身乏力'
                },
                {
                    name: '示例2 - 肠胃不适',
                    content: '上腹部疼痛两天，伴有恶心、反酸，饭后症状加重，没有呕吐和腹泻'
                }
            ],
            'symptom_diagnosis': [
                {
                    name: '示例1 - 皮肤问题',
                    content: '手臂上出现红色皮疹，伴有瘙痒，已经持续一周了'
                }
            ],
            'drug_consult': [
                {
                    name: '示例1 - 用药咨询',
                    content: '阿司匹林有哪些副作用？什么情况下不能使用？'
                }
            ],
            'report_interpret': [
                {
                    name: '示例1 - 体检报告',
                    content: '请解读以下体检报告：\n白细胞计数：6.8×10^9/L\n红细胞计数：4.9×10^12/L\n血红蛋白：145g/L\n血小板计数：230×10^9/L\n谷丙转氨酶：35U/L\n谷草转氨酶：28U/L\n总胆红素：15.2μmol/L\n空腹血糖：5.6mmol/L'
                }
            ]
        };

        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                if (data.success) {
                    modelConfigs = data.models;
                    renderModeGrid();
                    updateExampleButtons(selectedMode);
                }
            } catch (err) {
                console.error('加载模型列表失败:', err);
            }
        }

        function renderModeGrid() {
            const grid = document.getElementById('modeGrid');
            grid.innerHTML = '';
            
            Object.entries(modelConfigs).forEach(([key, config]) => {
                const card = document.createElement('div');
                card.className = `mode-card ${key === selectedMode ? 'selected' : ''}`;
                card.dataset.mode = key;
                card.innerHTML = `
                    <div class="mode-icon">${modeIcons[key] || '🔹'}</div>
                    <div class="mode-name">${config.name}</div>
                    <div class="mode-desc">${config.description}</div>
                `;
                card.addEventListener('click', () => selectMode(key));
                grid.appendChild(card);
            });
        }

        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.mode === mode);
            });
            
            const config = modelConfigs[mode];
            if (config) {
                document.getElementById('resultTitle').textContent = `📄 ${config.name}报告`;
            }
            
            updateExampleButtons(mode);
        }

        function updateExampleButtons(mode) {
            const exampleButtonsDiv = document.getElementById('exampleButtons');
            const modeExamples = examples[mode];
            
            if (modeExamples && modeExamples.length > 0) {
                exampleButtonsDiv.style.display = 'flex';
                exampleButtonsDiv.innerHTML = '';
                
                modeExamples.forEach((example, index) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'example-btn';
                    btn.textContent = example.name;
                    btn.onclick = () => fillExample(example.content);
                    exampleButtonsDiv.appendChild(btn);
                });
            } else {
                exampleButtonsDiv.style.display = 'none';
            }
        }

        function fillExample(content) {
            document.getElementById('textInput').value = content;
        }

        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png'].includes(ext)) return '🖼️';
            return '📁';
        }

        function addFile(file) {
            uploadedFile = file;
            renderFileList();
        }

        function removeFile() {
            uploadedFile = null;
            renderFileList();
        }

        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            if (uploadedFile) {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-info">
                        <span class="file-icon">${getFileIcon(uploadedFile.name)}</span>
                        <span class="file-name">${uploadedFile.name}</span>
                    </div>
                    <button type="button" class="file-remove" onclick="removeFile()">删除</button>
                `;
                fileList.appendChild(fileItem);
            }
        }

        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('fileInput');

        fileUploadArea.addEventListener('click', () => fileInput.click());

        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadArea.classList.add('dragover');
        });

        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.classList.remove('dragover');
        });

        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            if (files.length > 0) {
                const ext = files[0].name.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png'].includes(ext)) {
                    addFile(files[0]);
                }
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                addFile(files[0]);
            }
            fileInput.value = '';
        });

        function prepareInputText(mode, text) {
            if (mode === 'health_analysis') {
                return `请作为专业的健康顾问，对以下健康数据进行分析，并生成一份详细的健康报告。

健康数据：
${text}

请包含以下内容：
1. 整体健康状况评估
2. 各项指标分析（血压、血氧、血糖、心率等）
3. 健康风险提示
4. 具体的饮食建议（包括推荐食物、禁忌食物）
5. 运动建议（包括运动类型、频率、时长）
6. 生活方式改善建议
7. 就医建议（如需要）`;
            }
            return text;
        }

        document.getElementById('healthForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const responseMode = document.querySelector('input[name="responseMode"]:checked').value;
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');

            submitBtn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            resultSection.classList.remove('show');
            resultContent.textContent = '';

            try {
                const formData = new FormData();
                let textInput = document.getElementById('textInput').value;
                
                textInput = prepareInputText(selectedMode, textInput);

                formData.append('mode', selectedMode);
                formData.append('text', textInput);
                if (uploadedFile) {
                    formData.append('files', uploadedFile);
                }

                if (responseMode === 'stream') {
                    await handleStreamResponse(formData, resultSection, resultContent, loading, submitBtn, error, '/api/chat_stream');
                } else {
                    await handleNormalResponse(formData, resultSection, resultContent, loading, submitBtn, error, '/api/chat');
                }
            } catch (err) {
                error.textContent = '请求错误：' + err.message;
                error.style.display = 'block';
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showTimingInfo(ttfb, total) {
            const timingInfo = document.getElementById('timingInfo');
            const ttfbTime = document.getElementById('ttfbTime');
            const totalTime = document.getElementById('totalTime');
            
            ttfbTime.textContent = ttfb ? `${ttfb.toFixed(0)}ms` : '-';
            totalTime.textContent = total ? `${total.toFixed(0)}ms` : '-';
            timingInfo.style.display = 'flex';
        }

        function hideTimingInfo() {
            const timingInfo = document.getElementById('timingInfo');
            timingInfo.style.display = 'none';
        }

        async function handleNormalResponse(formData, resultSection, resultContent, loading, submitBtn, error, url) {
            hideTimingInfo();
            const startTime = performance.now();
            let ttfbTime = null;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                ttfbTime = performance.now() - startTime;

                const result = await response.json();
                const totalTime = performance.now() - startTime;

                if (result.success) {
                    resultContent.textContent = result.report;
                    resultSection.classList.add('show');
                    showTimingInfo(ttfbTime, totalTime);
                } else {
                    let errorMsg = '分析失败：' + result.error;
                    if (result.result) {
                        errorMsg += '\n\nAPI响应详情：\n' + JSON.stringify(result.result, null, 2);
                    }
                    if (result.traceback) {
                        errorMsg += '\n\n堆栈信息：\n' + result.traceback;
                    }
                    error.textContent = errorMsg;
                    error.style.display = 'block';
                    error.style.whiteSpace = 'pre-wrap';
                }
            } catch (err) {
                error.textContent = '请求错误：' + err.message;
                error.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function handleStreamResponse(formData, resultSection, resultContent, loading, submitBtn, error, url) {
            hideTimingInfo();
            const startTime = performance.now();
            let ttfbTime = null;
            let firstContentReceived = false;

            resultSection.classList.add('show');
            loading.innerHTML = '<div class="spinner"></div><p>正在生成分析报告，请稍候...</p>';
            resultContent.textContent = '';
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('网络请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (!firstContentReceived && value) {
                        ttfbTime = performance.now() - startTime;
                        firstContentReceived = true;
                    }
                    
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.error) {
                                    throw new Error(data.error);
                                }
                                if (data.text) {
                                    resultContent.textContent = data.text;
                                    resultContent.scrollTop = resultContent.scrollHeight;
                                }
                            } catch (e) {
                                console.error('解析数据失败:', e);
                            }
                        }
                    }
                }

                const totalTime = performance.now() - startTime;
                showTimingInfo(ttfbTime, totalTime);
            } catch (err) {
                error.textContent = '流式响应错误：' + err.message;
                error.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        loadModels();
    </script>
</body>
</html>
